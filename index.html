<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Cyber Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03030c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Cinematic UI Overlay */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: #ffffff;
            pointer-events: none; /* তেনাহলে মাউস মুভমেন্ট ক্যানভাসে আটকাবে */
            letter-spacing: 0.3em;
        }
        .overlay h1 {
            font-size: 3.5rem;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 238, 255, 0.6);
            margin-bottom: 10px;
        }
        .overlay p {
            font-size: 0.9rem;
            opacity: 0.6;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>DIGITAL HARMONY</h1>
        <p>Move your mouse to distort reality</p>
    </div>

    <canvas id="webgl"></canvas>

    <!-- Three.js Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SETUP SCENE, CAMERA & RENDERER ---
        const canvas = document.querySelector('#webgl');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- 2. CREATE PARTICLES WITH CUSTOM SHADERS (GPU POWERED) ---
        const count = 30000; // পার্টিক্যালের সংখ্যা
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);

        for(let i = 0; i < count * 3; i += 3) {
            // একটি ৩ডি গ্রিড বা ক্লাউড তৈরি করা হচ্ছে
            positions[i]     = (Math.random() - 0.5) * 10; // X
            positions[i + 1] = (Math.random() - 0.5) * 10; // Y
            positions[i + 2] = (Math.random() - 0.5) * 10; // Z
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // মাউস ডেটা এবং টাইম ট্র্যাক করার জন্য ইউনিফর্মস
        const uniforms = {
            uTime: { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) }
        };

        // Vertex Shader: প্রতিটি পার্টিক্যালের পজিশন ম্যাথমেটিক্যালি চেঞ্জ করবে GPU-তে
        const vertexShader = `
            uniform float uTime;
            uniform vec2 uMouse;
            varying vec3 vPosition;
            void main() {
                vPosition = position;
                vec3 pos = position;

                // একটি ফ্লুইড ওয়েভ ইফেক্ট তৈরি করা হচ্ছে sin/cos দিয়ে
                float wave = sin(pos.x * 1.5 + uTime) * cos(pos.y * 1.5 + uTime) * 0.4;
                pos.z += wave;

                // মাউসের সাথে ইন্টারঅ্যাকশন (মাউসের কাছে গেলে পার্টিক্যাল দূরে সরবে)
                float dist = distance(pos.xy, uMouse * 4.0);
                if(dist < 1.5) {
                    pos.z += (1.5 - dist) * 0.8;
                }

                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // দূরত্বের ওপর ভিত্তি করে পার্টিক্যালের সাইজ ঠিক করা
                gl_PointSize = 6.0 / -mvPosition.z;
            }
        `;

        // Fragment Shader: পার্টিক্যালের কালার এবং গ্লোয়িং ইফেক্ট দেবে
        const fragmentShader = `
            varying vec3 vPosition;
            void main() {
                // পার্টিক্যালগুলোকে চারকোনা থেকে গোল শেপে কনভার্ট করা
                float dist = distance(gl_PointCoord, vec2(0.5));
                if(dist > 0.5) discard;

                // কালার গ্রেডিয়েন্ট (সায়ান থেকে হালকা ব্লু ভাইব)
                vec3 color = vec3(0.0, 0.8, 1.0);
                float alpha = 1.0 - (dist * 2.0);

                gl_FragColor = vec4(color, alpha * 0.8);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: uniforms,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending // গ্লোয়িং ইফেক্টের জন্য ব্লেন্ডিং মোড
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // --- 3. MOUSE & RESIZE EVENTS ---
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (event) => {
            // মাউস কোঅর্ডিনেটকে -1 থেকে +1 এর মধ্যে নরমালাইজ করা হচ্ছে
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 4. ANIMATION LOOP ---
        const clock = new THREE.臨時Clock || new THREE.Clock();

        const animate = () => {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // ইউনিফর্মে ডেটা পাঠানো হচ্ছে আপডেট করার জন্য
            uniforms.uTime.value = elapsedTime * 0.5;
            
            // মাউসের মুভমেন্টকে একটু স্মুথ (Lerp) করা হচ্ছে
            uniforms.uMouse.value.x += (mouse.x - uniforms.uMouse.value.x) * 0.05;
            uniforms.uMouse.value.y += (mouse.y - uniforms.uMouse.value.y) * 0.05;

            // পুরো সিনটাকে হালকা একটু ঘোরানো যাতে ডেড ফিল না হয়
            points.rotation.y = elapsedTime * 0.02;

            renderer.render(scene, camera);
        };

        animate();
    </script>
</body>
</html>
