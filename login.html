<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SHAHADAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .custom-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 16px;
            text-align: center; max-width: 350px; width: 85%;
            box-shadow: 0 15px 35px rgba(0, 229, 255, 0.2);
        }
        .modal-content p { margin-bottom: 25px; color: #fff; }
    </style>
</head>
<body>

    <canvas id="webgl"></canvas>

    <div id="custom-alert" class="custom-modal">
        <div class="modal-content">
            <p id="alert-message"></p>
            <button onclick="closeAlert()" class="btn" style="padding: 8px 25px;">OK</button>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo">SHAHADAT</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Service</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content" style="min-height: 85vh; justify-content: center;">
        <div class="contact-form-card" style="max-width: 400px; width: 100%; text-align: center;">
            <h2 style="color: #00e5ff; margin-bottom: 25px; font-weight: 600;">Welcome Back</h2>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Log In</button>
                
                <p style="margin-top: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.5);">
                    Don't have an account? <a href="signup.html" style="color: #00e5ff; text-decoration: none;">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MD SHAHADAT. সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script>
        function showAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }
        function handleLogin(event) {
            event.preventDefault();
            const inputUser = document.getElementById('username').value.trim();
            const inputPass = document.getElementById('password').value;
            const storedUser = localStorage.getItem('savedUsername');
            const storedPass = localStorage.getItem('savedPassword');

            if (inputUser === storedUser && inputPass === storedPass) {
                localStorage.setItem('isLoggedIn', 'true'); 
                window.location.href = "services.html"; 
            } else {
                showAlert('Invalid Username or Password! Please Sign Up first.');
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="particles.js"></script>
</body>
</html>
