<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SHAHADAT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="webgl"></canvas>

    <header>
        <a href="index.html" class="logo">SHAHADAT</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Service</a></li>
                <li><a href="about.html">About us</a></li>
                <li><a href="contact.html">contact us</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content" style="justify-content: center; min-height: 100vh; padding-top: 80px;">
        <div class="contact-container" style="max-width: 400px; text-align: center; padding: 40px 30px;">
            <h2 style="color: #00e5ff; margin-bottom: 30px; font-size: 1.8rem; font-weight: 600;">Welcome Back</h2>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align: left;">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">Log In</button>
                
                <p style="margin-top: 25px; font-size: 0.9rem; color: rgba(255,255,255,0.6);">
                    Don't have an account? <a href="signup.html" style="color: #00e5ff; text-decoration: none; font-weight: 500;">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const inputUser = document.getElementById('username').value.trim();
            const inputPass = document.getElementById('password').value;

            // সাইন-আপ পেইজ থেকে সেভ হওয়া ডাটা তুলে আনা
            const storedUser = localStorage.getItem('savedUsername');
            const storedPass = localStorage.getItem('savedPassword');

            if (inputUser === storedUser && inputPass === storedPass) {
                window.location.href = "services.html"; // মিলে গেলে মেইন সার্ভিস পেইজে যাবে
            } else {
                alert('Invalid Username or Password! Please Sign Up first.');
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="particles.js"></script>
</body>
</html>
