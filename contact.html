<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ - MyWebsite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">MyWebsite</a>
        <nav>
            <ul>
                <li><a href="index.html">হোম</a></li>
                <li><a href="services.html">সার্ভিস</a></li>
                <li><a href="about.html">আমাদের সম্পর্কে</a></li>
                <li><a href="contact.html" class="active">যোগাযোগ</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <h2 class="section-title">যোগাযোগ করুন</h2>
        <div class="contact-container">
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('ধন্যবাদ! আপনার বার্তাটি সফলভাবে পাঠানো হয়েছে।');">
                <div class="form-group">
                    <label for="name">আপনার নাম</label>
                    <input type="text" id="name" required placeholder="এখানে নাম লিখুন">
                </div>
                <div class="form-group">
                    <label for="email">ইমেইল ঠিকানা</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="message">বার্তা</label>
                    <textarea id="message" required placeholder="আপনার মতামত বা প্রশ্ন এখানে লিখুন..."></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">send</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MyWebsite. সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

</body>
</html>
